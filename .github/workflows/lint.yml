---
name: Lint

defaults:
  run:
    shell: bash

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths:
      - "docs/**/*.md"
      - "**/*.py"
      - "**/*.yml"
      - "**/*.yaml"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-slim

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run Ruff linter
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b  # v4.0.0
        with:
          args: "check slither/ tests/ scripts/"

      - name: Run Ruff formatter check
        run: |
          echo "::group::Checking formatting with Ruff"
          ruff format --check slither/ tests/ scripts/ || FORMAT_EXIT=$?
          echo "::endgroup::"
          if [ "${FORMAT_EXIT:-0}" -ne 0 ]; then
            echo "❌ Formatting check failed. Run 'make reformat' or 'ruff format' locally to fix formatting."
            exit "$FORMAT_EXIT"
          fi
          echo "✅ Formatting check passed"

  yamllint:
    name: yamllint
    runs-on: ubuntu-slim

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v7
        with:
          enable-cache: true

      - name: Run yamllint
        run: |
          echo "::group::Running yamllint"
          uvx yamllint .github/ || YAML_EXIT=$?
          echo "::endgroup::"
          if [ "${YAML_EXIT:-0}" -ne 0 ]; then
            echo "❌ YAML linting failed. Fix the YAML syntax errors shown above."
            exit "$YAML_EXIT"
          fi
          echo "✅ YAML linting passed"

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-slim

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9  # v23.0.0
        with:
          globs: "docs/**/*.md"
          config: .github/linters/.markdownlint.json
